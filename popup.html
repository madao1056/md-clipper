<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1 .logo { font-size: 18px; font-weight: 700; color: #2563eb; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: #2563eb;
    }
    .field { margin-bottom: 12px; }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    button {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-secondary {
      background: #f1f5f9;
      color: #333;
      border: 1px solid #ddd;
    }
    .preview-toggle {
      margin-top: 12px;
      font-size: 12px;
      color: #2563eb;
      cursor: pointer;
      user-select: none;
    }
    .preview-toggle:hover { text-decoration: underline; }
    #preview-area {
      display: none;
      margin-top: 8px;
      max-height: 240px;
      overflow-y: auto;
      padding: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .status.success { color: #16a34a; }
    .status.error { color: #dc2626; }
    .loading {
      text-align: center;
      padding: 32px 0;
      color: #999;
    }
  </style>
</head>
<body>
  <div id="main" style="display:none">
    <h1><span class="logo">MD</span> Clipper</h1>

    <div class="field">
      <label>Title</label>
      <input type="text" id="title-input" />
    </div>

    <div class="field">
      <label>Subfolder</label>
      <input type="text" id="subfolder-input" placeholder="md-clipper" />
    </div>

    <div class="actions">
      <button class="btn-primary" id="save-btn">保存</button>
      <button class="btn-secondary" id="copy-btn">コピー</button>
    </div>

    <div class="preview-toggle" id="preview-toggle">▶ プレビュー</div>
    <div id="preview-area"></div>

    <div class="status" id="status"></div>
  </div>

  <div id="loading" class="loading">読み込み中...</div>

  <script src="popup.js"></script>
</body>
</html>
