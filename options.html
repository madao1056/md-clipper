<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      padding: 20px;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #2563eb; }
    .field { margin-bottom: 14px; }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    button {
      padding: 8px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #16a34a;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>MD Clipper 設定</h2>

  <div class="field">
    <label>保存先サブフォルダ</label>
    <input type="text" id="subfolder" placeholder="md-clipper" />
    <div class="hint">ダウンロードフォルダ配下の相対パス（例: knowledge/articles）</div>
  </div>

  <button id="save">保存</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
